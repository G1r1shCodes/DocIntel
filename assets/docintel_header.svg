<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="header-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#090D16" />
      <stop offset="100%" stop-color="#0B132B" />
    </linearGradient>

    <!-- Title Gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="40%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>

    <!-- Subtle Border Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.6" />
    </linearGradient>

    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0284C7" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Container Box -->
  <rect width="1200" height="240" rx="16" fill="url(#header-bg)" stroke="url(#border-grad)" stroke-width="1.5" />

  <!-- Ambient Glow Orbs -->
  <circle cx="150" cy="120" r="140" fill="#0284C7" opacity="0.08" filter="blur(50px)" />
  <circle cx="600" cy="120" r="160" fill="#6366F1" opacity="0.08" filter="blur(60px)" />
  <circle cx="1050" cy="120" r="140" fill="#10B981" opacity="0.08" filter="blur(50px)" />

  <!-- Logo Mark -->
  <g transform="translate(60, 68)" filter="url(#glow)">
    <rect width="64" height="64" rx="16" fill="#0284C7" />
    <path d="M 18 20 L 46 20 M 18 32 L 46 32 M 18 44 L 34 44" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" />
  </g>

  <!-- Title Text -->
  <text x="144" y="112" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="url(#title-grad)" letter-spacing="-1">DocIntel</text>
  
  <!-- Version Pill -->
  <g transform="translate(365, 80)">
    <rect width="70" height="24" rx="12" fill="#0F172A" stroke="#38BDF8" stroke-width="1" />
    <text x="35" y="16" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" fill="#38BDF8" text-anchor="middle">v1.0</text>
  </g>

  <!-- Tagline -->
  <text x="146" y="146" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#F8FAFC" letter-spacing="-0.2">Enterprise AI Document Intelligence Engine</text>
  
  <!-- Sub-bullet Features -->
  <text x="146" y="174" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="13" fill="#94A3B8">Multi-Format Parsers • Adaptive Chunking • Hybrid RAG • Bounding Box Citations</text>

  <!-- Status Pill Top Right -->
  <g transform="translate(1010, 40)">
    <rect width="130" height="28" rx="14" fill="#0F172A" stroke="#1E293B" stroke-width="1" />
    <circle cx="16" cy="14" r="4" fill="#10B981">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="28" y="18" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#94A3B8" letter-spacing="1">PROD READY</text>
  </g>
</svg>
